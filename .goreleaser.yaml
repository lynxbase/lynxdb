# .goreleaser.yaml
# GoReleaser configuration for LynxDB
# Docs: https://goreleaser.com
#
# This config builds LynxDB for all supported platforms, generates checksums,
# publishes to GitHub Releases, and uploads to CDN via post-hooks.

version: 2

project_name: lynxdb

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  # ── GNU/glibc builds ────────────────────────────────────────────────────
  - id: lynxdb-gnu
    binary: lynxdb
    main: ./cmd/lynxdb/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm  # No 32-bit ARM macOS
    ldflags:
      - -s -w
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Version={{.Version}}
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Date={{.Date}}
    flags:
      - -trimpath

  # ── Musl/static builds (Alpine, distroless) ────────────────────────────
  - id: lynxdb-musl
    binary: lynxdb
    main: ./cmd/lynxdb/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Version={{.Version}}
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/OrlovEvgeny/Lynxdb/internal/buildinfo.Date={{.Date}}
    flags:
      - -trimpath
    # Tag these so archive names include "-musl"
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # ── Standard archives (tar.gz for Unix, zip for Windows) ───────────────
  - id: default
    builds:
      - lynxdb-gnu
    format: tar.gz
    name_template: >-
      lynxdb-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md*

  # ── Musl archives ──────────────────────────────────────────────────────
  - id: musl
    builds:
      - lynxdb-musl
    format: tar.gz
    name_template: >-
      lynxdb-v{{ .Version }}-{{ .Os }}-{{ .Arch }}-musl
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: auto
  name_template: "LynxDB v{{ .Version }}"
  header: |
    ## LynxDB v{{ .Version }}

    ### Quick Install
    ```bash
    curl -fsSL https://lynxdb.org/install.sh | sh
    ```

    ### Checksums
    All artifacts are signed and checksummed. Verify with:
    ```bash
    sha256sum -c checksums.txt
    ```
  footer: |
    ---
    **Full changelog**: https://github.com/OrlovEvgeny/Lynxdb/compare/{{ .PreviousTag }}...{{ .Tag }}

# ── Homebrew Tap ──────────────────────────────────────────────────────────
brews:
  - name: lynxdb
    repository:
      owner: lynxbase
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: lynxdb-bot
      email: bot@lynxdb.org
    homepage: "https://lynxdb.org"
    description: "Open-source log analytics database. Single binary. SPL2 query language."
    license: "Apache-2.0"
    install: |
      bin.install "lynxdb"
    test: |
      system "#{bin}/lynxdb", "version"

# ── Docker images ─────────────────────────────────────────────────────────
dockers:
  - image_templates:
      - "orlovevgeny/lynxdb:{{ .Version }}-amd64"
      - "orlovevgeny/lynxdb:latest-amd64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/amd64"
    ids:
      - lynxdb-gnu
    goarch: amd64

  - image_templates:
      - "orlovevgeny/lynxdb:{{ .Version }}-arm64"
      - "orlovevgeny/lynxdb:latest-arm64"
    use: buildx
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/arm64"
    ids:
      - lynxdb-gnu
    goarch: arm64

docker_manifests:
  - name_template: "orlovevgeny/lynxdb:{{ .Version }}"
    image_templates:
      - "orlovevgeny/lynxdb:{{ .Version }}-amd64"
      - "orlovevgeny/lynxdb:{{ .Version }}-arm64"
  - name_template: "orlovevgeny/lynxdb:latest"
    image_templates:
      - "orlovevgeny/lynxdb:latest-amd64"
      - "orlovevgeny/lynxdb:latest-arm64"

# ── Announce ──────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: "Features"
      regexp: "^feat"
    - title: "Bug Fixes"
      regexp: "^fix"
    - title: "Performance"
      regexp: "^perf"
    - title: "Other"
      order: 999
