# Fluent Bit configuration for LynxDB.
[INPUT]
    Name tail
    Path /var/log/*.log
    Tag app
    Read_From_Head On

[OUTPUT]
    Name es
    Match *
    Host {{ host .Remote }}
    Port {{ port .Remote }}
    HTTP_User ""
    Logstash_Format Off
    Index fluent-bit
    Suppress_Type_Name On
    Generate_ID On
    Compress gzip
# Generate_ID is harmless; LynxDB echoes IDs but remains append-only.
