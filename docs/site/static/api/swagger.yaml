openapi: 3.0.3
info:
  title: LynxDB API
  version: 1.0.0
  description: |
    Splunk-power log analytics in a single binary. Zero dependencies. SPL2-compatible.

    ## Design Principles

    1. **One URL — one resource.** `POST /query` does a query. `POST /ingest` ingests.
    2. **Streaming-first.** Large-data endpoints support NDJSON via `Accept: application/x-ndjson`.
    3. **Errors are UX.** Every error carries `code`, `message`, and optionally `suggestion` and `docs_url`.
    4. **Single auth model.** Bearer token. Optional. Off by default.
    5. **Zero required headers.** `Content-Type` defaults to `application/json`. `curl` just works.

    ## Authentication

    Off by default. When enabled via `lynxdb server --auth`:

    ```
    Authorization: Bearer <token>
    ```

    ## Response Envelope

    ```json
    // Success — "data" present, "error" absent
    {"data": {...}, "meta": {"took_ms": 89}}

    // Error — "error" present, "data" absent
    {"error": {"code": "INVALID_QUERY", "message": "...", "suggestion": "..."}}
    ```

    No `"status": "ok"`. HTTP status codes carry that.

  contact:
    name: LynxDB
    url: https://lynxdb.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3100/api/v1
    description: Local development

tags:
  - name: Ingest
    description: Send log events into LynxDB
  - name: Query
    description: Search, aggregate, and analyze logs using SPL2
  - name: Live
    description: Real-time log streaming and histogram
  - name: Schema
    description: Field discovery and value stats
  - name: Server
    description: Health checks and server status
  - name: Saved Queries
    description: Persist and reuse SPL2 queries
  - name: Materialized Views
    description: Precomputed projections and aggregations for query acceleration
  - name: Config
    description: Runtime configuration management
  - name: Compatibility
    description: Elasticsearch and OpenTelemetry compatibility endpoints

# SECURITY
security:
  - BearerAuth: []
  - {}

# PATHS
paths:

  # INGEST

  /ingest:
    post:
      operationId: ingest
      tags: [Ingest]
      summary: Ingest events
      description: |
        Primary structured ingest endpoint. Accepts only a top-level JSON array of event-envelope objects.

        - Each item must contain `event` plus optional `time`, `source`, `sourcetype`, `host`, `index`, and `fields`.
        - Use `/ingest/raw` for newline-delimited text or NDJSON.
        - Use `/es/_bulk` for Elasticsearch bulk payloads.
      parameters:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/StructuredIngestEvent'
            examples:
              batch:
                summary: Batch of events
                value:
                  - event: "request started"
                    source: "api"
                    fields:
                      trace_id: "abc123"
                  - event: "request completed"
                    source: "api"
                    fields:
                      trace_id: "abc123"
                      duration_ms: 45
      responses:
        '200':
          description: All events accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
              example:
                data:
                  accepted: 3
                  failed: 0
        '207':
          description: Partial failure — some events accepted, some rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPartialResponse'
              example:
                data:
                  accepted: 2
                  failed: 1
                  errors:
                    - index: 1
                      code: "PARSE_ERROR"
                      message: "Invalid JSON at line 2"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'

  /ingest/bulk:
    post:
      operationId: ingestBulk
      tags: [Ingest]
      summary: Elasticsearch-compatible bulk ingest
      description: |
        Accepts Elasticsearch `_bulk` API format for zero-config migration from Filebeat, Logstash, Vector, Fluentd.
        Prefer `/es/_bulk`; `/ingest/bulk` is an alias to the same handler.

        - `_index` is accepted but mapped to `_source` tag (LynxDB is single-index by design).
        - `_type` is ignored.
        - Response mimics ES bulk shape for client compatibility.
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
            example: |
              {"index": {"_index": "logs"}}
              {"message": "hello from filebeat", "@timestamp": "2026-02-14T12:00:00Z"}
              {"index": {"_index": "logs"}}
              {"message": "another event"}
      responses:
        '200':
          description: Bulk ingest result (ES-compatible shape)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ESBulkResponse'
              example:
                took: 12
                errors: false
                items:
                  - index:
                      _id: "01JKNM3VXQP..."
                      status: 201
                  - index:
                      _id: "01JKNM4ABCD..."
                      status: 201
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  # QUERY

  /query:
    post:
      operationId: queryPost
      tags: [Query]
      summary: Execute SPL2 query
      description: |
        Core search endpoint. Executes any SPL2 pipeline including search, aggregation, and management commands.

        **Execution modes** (controlled by `wait` parameter):

        | `wait` value | Behavior | Response |
        |---|---|---|
        | `null` (default) | **Sync.** Block until complete. | `200` with results |
        | `0` | **Async.** Return immediately. | `202` with job handle |
        | `N` (seconds) | **Hybrid.** Wait up to N seconds. | `200` if done in time, `202` + job otherwise |

        Hybrid mode (`wait: 5`) is ideal for Web UI — fast queries return instantly, slow ones degrade to async with progress tracking.

        **Response `data.type` determines rendering:**
        - `events` → log viewer (raw events)
        - `aggregate` → table (stats results)
        - `timechart` → chart (time-series)
        - `view_created` → MV creation confirmation (when query contains `| materialize`)
        - `job` → async job handle (when `wait` is set and query didn't complete in time)

        **MV acceleration:** when the query planner detects a Materialized View that covers the query,
        `meta.accelerated_by` is present in the response.

        **SPL2 management commands** also flow through this endpoint:
        - `| materialize "name"` — create MV
        - `| from mv_name` — read from MV
        - `| views` — list MVs
        - `| dropview "name"` — delete MV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
            examples:
              search:
                summary: Basic log search (sync, default)
                value:
                  q: "level=error"
                  from: "-1h"
                  limit: 100
              aggregation:
                summary: Aggregation query (sync)
                value:
                  q: "source=nginx status>=500 | stats count by uri | sort -count | head 10"
                  from: "-1h"
                  to: "now"
              hybrid:
                summary: Hybrid mode — wait up to 5s, then fall back to async
                value:
                  q: "* | stats count by source, status"
                  from: "-30d"
                  wait: 5
              async:
                summary: Async — return job handle immediately
                value:
                  q: "* | stats dc(user_id) by source"
                  from: "-90d"
                  wait: 0
              timechart:
                summary: Time-series chart
                value:
                  q: "level=error | timechart count span=5m"
                  from: "-6h"
              mv_query:
                summary: Query a materialized view
                value:
                  q: "| from mv_errors_5m | where source=\"nginx\" | sort -count | head 10"
              mv_create:
                summary: Create a materialized view
                value:
                  q: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket | materialize \"mv_errors_5m\" retention=90d"
      responses:
        '200':
          description: |
            Query completed synchronously. Returned when:
            - `wait` is `null` (default sync mode) and query completes in-request
            - `wait` is `N > 0` (hybrid mode) and query completes within N seconds
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/QueryEventsResponse'
                  - $ref: '#/components/schemas/QueryAggregateResponse'
                  - $ref: '#/components/schemas/QueryTimechartResponse'
                  - $ref: '#/components/schemas/QueryViewCreatedResponse'
              examples:
                events:
                  summary: Raw events result
                  value:
                    data:
                      type: events
                      events:
                        - _id: "01JKNM3VXQP..."
                          _timestamp: "2026-02-14T14:52:01.234Z"
                          _source: nginx
                          level: error
                          status: 502
                          uri: "/api/v1/users"
                          method: GET
                          duration_ms: 12
                      total: 1247
                      has_more: true
                    meta:
                      took_ms: 89
                      scanned: 12400000
                      query_id: "qry_7f3a..."
                aggregate:
                  summary: Aggregation result
                  value:
                    data:
                      type: aggregate
                      columns: ["uri", "count"]
                      rows:
                        - ["/api/v1/users", 1247]
                        - ["/api/v1/orders", 893]
                        - ["/health", 412]
                      total_rows: 42
                    meta:
                      took_ms: 34
                      scanned: 12400000
                      query_id: "qry_8b2c..."
                accelerated:
                  summary: MV-accelerated result
                  value:
                    data:
                      type: aggregate
                      columns: ["source", "count"]
                      rows:
                        - ["nginx", 142847]
                        - ["api-gw", 89234]
                      total_rows: 5
                    meta:
                      took_ms: 3
                      scanned: 142847
                      query_id: "qry_d4e1..."
                      accelerated_by:
                        view: mv_errors_5m
                        original_scan: 12400000
                        speedup: "~400x"
                partial:
                  summary: Partial result (MV still backfilling)
                  value:
                    data:
                      type: aggregate
                      partial: true
                      columns: ["source", "count"]
                      rows:
                        - ["nginx", 95231]
                        - ["api-gw", 42100]
                    meta:
                      took_ms: 4
                      scanned: 95231
                      query_id: "qry_f2a1..."
                      accelerated_by:
                        view: mv_errors_5m
                        status: backfilling
                        coverage_percent: 66.7
                timechart:
                  summary: Time-series result
                  value:
                    data:
                      type: timechart
                      interval: "5m"
                      columns: ["_time", "count"]
                      rows:
                        - ["2026-02-14T14:00:00Z", 42]
                        - ["2026-02-14T14:05:00Z", 87]
                        - ["2026-02-14T14:10:00Z", 156]
                    meta:
                      took_ms: 45
                      scanned: 12400000
                      query_id: "qry_9c1d..."
                view_created:
                  summary: Materialized view created
                  value:
                    data:
                      type: view_created
                      view:
                        name: mv_errors_5m
                        query: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                        kind: aggregation
                        retention: "90d"
                        status: backfilling
                        version: 1
                        backfill:
                          total: 12400000
                          processed: 0
                          percent: 0
                    meta:
                      took_ms: 12
        '202':
          description: |
            Query accepted for async execution. Returned when:
            - `wait: 0` (async mode) — always returns 202 immediately
            - `wait: N` (hybrid mode) — query didn't complete within N seconds

            Response contains a job handle with current progress. Use `GET /query/jobs/{id}` to poll
            or `GET /query/jobs/{id}/stream` for real-time SSE updates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryJobResponse'
              examples:
                async_immediate:
                  summary: Async — job just started
                  value:
                    data:
                      type: job
                      job_id: "qry_9c1d4e"
                      status: running
                      progress:
                        phase: parsing
                        elapsed_ms: 0
                hybrid_fallback:
                  summary: Hybrid — timed out after 5s, shows progress so far
                  value:
                    data:
                      type: job
                      job_id: "qry_7f3a2b"
                      status: running
                      progress:
                        phase: scanning_segments
                        segments_total: 128
                        segments_scanned: 24
                        rows_read_so_far: 847291
                        elapsed_ms: 5000
        '400':
          $ref: '#/components/responses/InvalidQuery'
        '429':
          $ref: '#/components/responses/RateLimited'
    get:
      operationId: queryGet
      tags: [Query]
      summary: Execute SPL2 query (GET convenience)
      description: GET variant for simple queries. Use POST for complex or long queries.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: "level=error"
        - name: from
          in: query
          schema:
            type: string
            default: "-15m"
          example: "-1h"
        - name: to
          in: query
          schema:
            type: string
            default: "now"
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 50000
        - name: format
          in: query
          schema:
            type: string
            enum: [json]
            default: json
          description: Optional response format selector. Only `json` is accepted.
      responses:
        '200':
          description: Query result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/QueryEventsResponse'
                  - $ref: '#/components/schemas/QueryAggregateResponse'
                  - $ref: '#/components/schemas/QueryTimechartResponse'
        '400':
          $ref: '#/components/responses/InvalidQuery'

  /query/stream:
    post:
      operationId: queryStream
      tags: [Query]
      summary: Execute query with NDJSON streaming
      description: |
        Returns an NDJSON stream for large result sets, exports, and piping.

        **This is different from job SSE** (`GET /query/jobs/{id}/stream`):
        - `/query/stream` — NDJSON export of results. One event per line. For `curl | jq`, data pipelines.
        - `/query/jobs/{id}/stream` — SSE progress tracking. For Web UI real-time updates.

        - Response: `Transfer-Encoding: chunked`, one JSON object per line.
        - Last line is always `{"__meta": {...}}` — stream summary.
        - Supported request fields: `q`/`query`, `from`/`earliest`, `to`/`latest`, and `variables`.
        - `limit`, `offset`, `wait`, `profile`, and `format` are rejected with `400`.
        - Client disconnect = cancellation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryStreamRequest'
            example:
              q: "level=error"
              from: "-24h"
      responses:
        '200':
          description: NDJSON event stream
          content:
            application/x-ndjson:
              schema:
                type: string
              example: |
                {"_id":"01JKN...","_timestamp":"2026-02-14T14:52:01Z","level":"error","message":"timeout"}
                {"_id":"01JKN...","_timestamp":"2026-02-14T14:51:58Z","level":"error","message":"refused"}
                {"__meta":{"total":8432,"scanned":12400000,"took_ms":342}}
        '400':
          $ref: '#/components/responses/InvalidQuery'

  /query/explain:
    get:
      operationId: queryExplain
      tags: [Query]
      summary: Parse and explain query without executing
      description: |
        Returns the parsed pipeline, estimated cost, fields involved, and MV acceleration availability.
        Powers autocomplete, red-underline validation, and query planner UI.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: "source=nginx | stats count by uri"
      responses:
        '200':
          description: Query explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryExplainResponse'
              examples:
                valid:
                  summary: Valid query with MV acceleration
                  value:
                    data:
                      parsed:
                        pipeline:
                          - type: search
                            filters:
                              - field: source
                                op: "="
                                value: nginx
                          - type: stats
                            aggregations:
                              - fn: count
                            group_by: ["uri"]
                        result_type: aggregate
                        estimated_cost: low
                        uses_full_scan: false
                        fields_read: ["source", "uri"]
                        fields_produced: ["uri", "count"]
                      acceleration:
                        available: true
                        view: mv_nginx_parsed
                        reason: "MV covers filter (source=nginx) and GROUP BY (uri) with count aggregate"
                        estimated_speedup: "~200x"
                      is_valid: true
                invalid:
                  summary: Invalid query with suggestion
                  value:
                    data:
                      is_valid: false
                      errors:
                        - position: 24
                          length: 6
                          message: "Unknown command 'staats'"
                          suggestion: stats

  /query/jobs:
    get:
      operationId: listJobs
      tags: [Query]
      summary: List active and recent query jobs
      description: |
        Returns all running jobs and recently completed jobs (kept for `job_ttl`, default 5 minutes).
        Useful for Web UI job manager and debugging. The optional `status` filter accepts
        canonical values (`running`, `done`, `error`, `canceled`) and the aliases
        `complete`, `failed`, and `cancelled`.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [running, done, error, canceled, complete, failed, cancelled]
          description: Filter by job status
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
              example:
                data:
                  jobs:
                    - job_id: "qry_9c1d4e"
                      status: running
                      query: "* | stats dc(user_id) by source"
                      created_at: "2026-02-14T14:50:00Z"
                    - job_id: "qry_7f3a2b"
                      status: done
                      query: "level=error | stats count by source"
                      created_at: "2026-02-14T14:48:12Z"

  /query/jobs/{jobId}:
    get:
      operationId: getJob
      tags: [Query]
      summary: Get job status, progress, and results
      description: |
        Poll this endpoint to track query progress. Response shape depends on `status`:

        - `running` → `progress`
        - `done` → `results`
        - `error` → `error`
        - `canceled` → cancellation error payload
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          example: "qry_9c1d4e"
      responses:
        '200':
          description: Job status and results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryJobResponse'
              examples:
                running:
                  summary: Running
                  value:
                    data:
                      type: job
                      job_id: "qry_9c1d4e"
                      status: running
                      query: "* | stats dc(user_id) by source, status"
                      progress:
                        phase: scanning_segments
                        segments_total: 128
                        segments_scanned: 64
                        rows_read_so_far: 423000000
                        elapsed_ms: 18400
                done:
                  summary: Completed — final results
                  value:
                    data:
                      type: job
                      job_id: "qry_9c1d4e"
                      status: done
                      query: "* | stats dc(user_id) by source, status"
                      created_at: "2026-02-14T14:50:00Z"
                      completed_at: "2026-02-14T14:50:37Z"
                      results:
                        type: aggregate
                        columns: ["source", "status", "dc(user_id)"]
                        rows:
                          - ["nginx", 200, 1784682]
                          - ["nginx", 404, 85762]
                          - ["api-gw", 200, 1224088]
                          - ["api-gw", 500, 12044]
                        total_rows: 14
                    meta:
                      took_ms: 37200
                      scanned: 84700000000
                error:
                  summary: Failed — error details
                  value:
                    data:
                      type: job
                      job_id: "qry_d4e1f2"
                      status: error
                      query: "* | stats count by uri"
                      error:
                        code: QUERY_MEMORY_EXCEEDED
                        message: "Query exceeded 512 MB memory limit at 20% scan. Too many unique 'uri' values (>2M) for GROUP BY."
                        suggestion: "Add a filter to reduce cardinality, or increase max_query_memory_mb in /config."
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: cancelJob
      tags: [Query]
      summary: Cancel a running query job
      description: |
        Cancels a running job. The response always returns the current terminal status plus
        a `canceled` flag that tells you whether this request changed the job state.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          example: "qry_9c1d4e"
      responses:
        '200':
          description: Current job state after the cancel attempt
          content:
            application/json:
              examples:
                cancelled:
                  summary: Successfully cancelled
                  value:
                    data:
                      job_id: "qry_9c1d4e"
                      status: canceled
                      canceled: true
                      completed_at: "2026-02-14T14:50:18Z"
                already_done:
                  summary: Job already finished
                  value:
                    data:
                      job_id: "qry_9c1d4e"
                      status: done
                      canceled: false
                      completed_at: "2026-02-14T14:50:37Z"
        '404':
          $ref: '#/components/responses/NotFound'

  /query/jobs/{jobId}/stream:
    get:
      operationId: streamJob
      tags: [Query]
      summary: SSE stream of job progress and final results
      description: |
        Server-Sent Events stream for real-time job tracking. Preferred over polling for Web UI.

        **Event types:**

        | Event | When | Data |
        |---|---|---|
        | `progress` | Every ~1s while running | Progress snapshot plus optional preview rows |
        | `complete` | Query finished | Final results |
        | `failed` | Query errored | Error object |
        | `canceled` | Job was cancelled | Progress at cancellation |

        SSE (not WebSocket) because this is a unidirectional server→client stream. SSE auto-reconnects,
        passes through proxies, and works with the native `EventSource` browser API.

        ```javascript
        const es = new EventSource("/api/v1/query/jobs/qry_xxx/stream");
        es.addEventListener("progress", (e) => updateProgressBar(JSON.parse(e.data)));
        es.addEventListener("complete", (e) => { showFinalResults(JSON.parse(e.data)); es.close(); });
        es.addEventListener("failed",   (e) => { showError(JSON.parse(e.data)); es.close(); });
        ```
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          example: "qry_9c1d4e"
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: progress
                data: {"phase":"scanning_segments","scanned":24,"segments_total":128,"percent":18.75,"events_matched":847291,"elapsed_ms":5000,"eta_ms":21666}

                event: complete
                data: {"data":{"type":"aggregate","columns":["source","count"],"rows":[["nginx",712345],["api-gw",356789]],"total_rows":5},"meta":{"took_ms":23100,"scanned":10400000000}}

        '404':
          $ref: '#/components/responses/NotFound'

  # LIVE

  /tail:
    get:
      operationId: liveTail
      tags: [Live]
      summary: SSE live tail with full SPL2 pipeline
      description: |
        Server-Sent Events stream for real-time log tailing with full SPL2 pipeline support.
        Uses the same query engine as `POST /query`, but in streaming mode.

        **Two phases:**

        1. **Catchup** — replays the last `count` matching events from storage (time range: `from` to now).
           Each event is sent as `event: result`. Phase ends with `event: catchup_done`.
        2. **Live** — streams new events from the EventBus through the SPL2 pipeline in real time.
           Events are sent as `event: result`. Heartbeat every 15s as `event: heartbeat`.

        **Supported SPL2 commands** (streaming, event-by-event):
        `search`, `where`, `eval`, `fields`, `table`, `rename`, `rex`, `fillnull`, `head`, `bin`.

        Commands requiring full materialization (`stats`, `sort`, `join`, `dedup`, `timechart`, etc.)
        are rejected with `422`.

        ```javascript
        const es = new EventSource("/api/v1/tail?q=search+ERROR+|+where+status>500&count=100&from=-1h");
        es.addEventListener("result",       (e) => appendRow(JSON.parse(e.data)));
        es.addEventListener("catchup_done", (e) => showLiveIndicator());
        es.addEventListener("heartbeat",    (e) => updatePing());
        es.addEventListener("error",        (e) => showError(JSON.parse(e.data)));
        ```

        SSE (not WebSocket) because this is a unidirectional server-to-client stream. SSE auto-reconnects,
        passes through proxies, and works with the native `EventSource` browser API.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: SPL2 query (streaming commands only)
          examples:
            keyword:
              summary: Simple keyword search
              value: "search ERROR"
            filtered:
              summary: Filter with eval and projection
              value: "search index=main ERROR | where status > 500 | eval sev=upper(level) | fields _time, _raw, sev"
        - name: count
          in: query
          schema:
            type: integer
            default: 100
            minimum: 0
            maximum: 10000
          description: Number of historical events to replay during catchup phase
        - name: from
          in: query
          schema:
            type: string
            default: "-1h"
          description: Catchup lookback window (relative or ISO 8601)
          example: "-1h"
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: result
                data: {"_time":"2026-02-14T14:51:58Z","_raw":"level=ERROR status=502 uri=/api/users","status":502}

                event: result
                data: {"_time":"2026-02-14T14:52:01Z","_raw":"level=ERROR status=503 uri=/api/orders","status":503}

                event: catchup_done
                data: {"count":2}

                event: result
                data: {"_time":"2026-02-14T14:52:15Z","_raw":"level=ERROR status=500 uri=/api/pay","status":500}

                event: heartbeat
                data: {"ts":"2026-02-14T14:52:30Z"}

        '400':
          description: Parse error — invalid SPL2 query
          content:
            application/json:
              example:
                error: "Unknown command 'staats'"
                suggestion: stats
        '422':
          description: Query contains unsupported commands for tail
          content:
            application/json:
              example:
                error: "unsupported commands for tail: stats (aggregation and stateful commands require full materialization)"
                unsupported: ["stats"]

  /histogram:
    get:
      operationId: histogram
      tags: [Live]
      summary: Time-bucketed event counts
      description: |
        Powers the timeline bar chart in the Web UI. Fires on every filter change — must be blazing fast.
        Separate from `/query` because it runs independently and concurrently.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: SPL2 filter expression (search part only, before pipes)
