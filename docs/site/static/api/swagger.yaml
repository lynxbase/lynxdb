  # MATERIALIZED VIEWS

  /views:
    get:
      operationId: listViews
      tags: [Materialized Views]
      summary: List all materialized views
      description: Returns every MV with operational status, storage, lag, and backfill progress.
      responses:
        '200':
          description: MV list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewsListResponse'
              example:
                data:
                  views:
                    - name: mv_errors_5m
                      kind: aggregation
                      query: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                      retention: "90d"
                      status: active
                      version: 1
                      rows: 142847
                      segments: 12
                      storage_bytes: 12582912
                      lag_ms: 1200
                      created_at: "2026-02-12T10:00:00Z"
                      last_event: "2026-02-14T14:52:01Z"
                    - name: mv_5xx_hourly
                      kind: aggregation
                      query: "source=nginx status>=500 | stats count, p95(duration) by uri, time_bucket(timestamp, '1h') AS hour"
                      retention: "365d"
                      status: backfilling
                      version: 1
                      rows: 6720
                      segments: 3
                      storage_bytes: 348160
                      lag_ms: null
                      backfill:
                        total: 12600000
                        processed: 8400000
                        percent: 66.7
                        eta_seconds: 134
                      created_at: "2026-02-14T14:30:00Z"
                      last_event: null
    post:
      operationId: createView
      tags: [Materialized Views]
      summary: Create a materialized view (or trigger rebuild)
      description: |
        REST equivalent of `| materialize`. If name already exists, triggers a **versioned rebuild**:
        old version keeps serving queries, new version builds in background, atomic swap on completion.

        Send `If-None-Match: *` to get `409 Conflict` if the view already exists (prevents accidental rebuilds).
      parameters:
        - name: If-None-Match
          in: header
          schema:
            type: string
          description: 'Set to `*` to prevent rebuild of existing view'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewInput'
            examples:
              aggregation:
                summary: Aggregation MV
                value:
                  name: mv_errors_5m
                  q: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                  retention: "90d"
              projection:
                summary: Projection MV
                value:
                  name: mv_access
                  q: "source=nginx | extract timestamp, method, uri, status, size, duration"
                  retention: "14d"
                  partition_by: "date(timestamp)"
              cascading:
                summary: Cascading MV (built on another MV)
                value:
                  name: mv_errors_1h
                  q: "| from mv_errors_5m | stats sum(count) AS count by source, time_bucket(bucket, '1h') AS hour"
                  retention: "365d"
      responses:
        '201':
          description: MV created, backfill started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewResponse'
              example:
                data:
                  name: mv_errors_5m
                  kind: aggregation
                  query: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                  retention: "90d"
                  status: backfilling
                  version: 1
                  backfill:
                    total: 12400000
                    processed: 0
                    percent: 0
        '200':
          description: Existing MV — versioned rebuild triggered
          content:
            application/json:
              example:
                data:
                  name: mv_errors_5m
                  kind: aggregation
                  query: "level=error | stats count, avg(duration), p99(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                  retention: "90d"
                  status: rebuilding
                  version: 2
                  previous_version:
                    version: 1
                    status: active
                  backfill:
                    total: 12400000
                    processed: 0
                    percent: 0
        '409':
          description: Conflict — view exists and `If-None-Match` was set
          content:
            application/json:
              example:
                error:
                  code: ALREADY_EXISTS
                  message: "View 'mv_errors_5m' already exists. Remove If-None-Match header to trigger rebuild."

  /views/{name}:
    get:
      operationId: getView
      tags: [Materialized Views]
      summary: Get MV details, column schema, and stats
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: mv_errors_5m
      responses:
        '200':
          description: Full MV details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewDetailResponse'
              example:
                data:
                  name: mv_errors_5m
                  kind: aggregation
                  query: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
                  retention: "90d"
                  status: active
                  version: 1
                  columns:
                    - name: source
                      type: string
                      encoding: dictionary
                    - name: bucket
                      type: timestamp
                      encoding: delta-of-delta
                    - name: count
                      type: int64
                      encoding: delta-varint
                    - name: "avg(duration)"
                      type: float64
                      derived_from: ["_sum_duration", "_count_duration"]
                  group_by: ["source", "bucket"]
                  aggregations: ["count", "avg(duration)"]
                  stats:
                    rows: 142847
                    segments: 12
                    segments_pending_merge: 3
                    storage_bytes: 12582912
                    compression_ratio: 18.4
                    lag_ms: 1200
                    ingest_rate: 234.5
                    oldest_event: "2026-01-15T00:00:01Z"
                    newest_event: "2026-02-14T14:52:01Z"
                  source_view: null
                  created_at: "2026-02-12T10:00:00Z"
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchView
      tags: [Materialized Views]
      summary: Update mutable MV properties
      description: |
        Only `retention` and `paused` can be changed without rebuild.
        To change `q`, `partition_by`, or `group_by`, use `POST /views` with the same name (triggers rebuild).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewPatchInput'
            examples:
              change_retention:
                summary: Change retention
                value:
                  retention: "30d"
              pause:
                summary: Pause MV pipeline
                value:
                  paused: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteView
      tags: [Materialized Views]
      summary: Delete MV and all its data
      description: |
        Atomic deletion. If the view has cascading dependents, returns `409`.
        Use `?force=true` to delete the view and all dependents.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Delete view and all cascading dependents
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: View has dependents
          content:
            application/json:
              example:
                error:
                  code: HAS_DEPENDENTS
                  message: "Cannot delete 'mv_errors_5m': view 'mv_errors_1h' depends on it."
                  dependents: ["mv_errors_1h"]
                  suggestion: "Delete dependent views first, or use ?force=true to delete all."

  /views/{name}/backfill:
    get:
      operationId: viewBackfill
      tags: [Materialized Views]
      summary: Backfill/rebuild progress
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Backfill status
          content:
            application/json:
              examples:
                in_progress:
                  summary: Backfill in progress
                  value:
                    data:
                      status: backfilling
                      version: 1
                      total: 12600000
                      processed: 8400000
                      percent: 66.7
                      rate: 62500
                      eta_seconds: 67
                      started_at: "2026-02-14T14:30:00Z"
                      cursor: "seg-004:offset-847291"
                      errors: 0
                idle:
                  summary: No backfill running
                  value:
                    data:
                      status: idle
                      last_completed: "2026-02-12T10:04:23Z"
        '404':
          $ref: '#/components/responses/NotFound'

