  # COMPATIBILITY

  /es/_bulk:
    post:
      operationId: esBulk
      tags: [Compatibility]
      summary: Elasticsearch _bulk API
      description: |
        Drop-in compatible with Filebeat, Logstash, Vector, Fluentd.
        `_index` maps to `_source` tag. `_type` is ignored.

        ```yaml
        # Filebeat config:
        output.elasticsearch:
          hosts: ["http://lynxdb:3100/api/v1/es"]
        ```
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
      responses:
        '200':
          description: ES-compatible bulk response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ESBulkResponse'

  /es/{index}/_doc:
    post:
      operationId: esIndexDoc
      tags: [Compatibility]
      summary: Elasticsearch single-doc ingest
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogEvent'
      responses:
        '201':
          description: Document indexed
          content:
            application/json:
              example:
                _id: "01JKNM3VXQP..."
                result: created

  /es/:
    get:
      operationId: esClusterInfo
      tags: [Compatibility]
      summary: Fake ES cluster info (Filebeat handshake)
      responses:
        '200':
          description: Minimal cluster info for client compatibility
          content:
            application/json:
              example:
                name: lynxdb
                cluster_name: lynxdb
                version:
                  number: "8.0.0"
                  build_flavor: default
                tagline: "LynxDB — Splunk-power log analytics in a single binary"

  /otlp/v1/logs:
    post:
      operationId: otlpLogs
      tags: [Compatibility]
      summary: OpenTelemetry OTLP log ingest
      description: |
        Accepts OTLP HTTP logs in JSON format.

        Requests with `Content-Type: application/x-protobuf` are rejected with
        `415 Unsupported Media Type`.

        ```yaml
        # OTEL Collector config:
        exporters:
          otlp_http:
            endpoint: http://lynxdb:3100/api/v1/otlp
            encoding: json
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Accepted

# COMPONENTS
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Optional. Off by default. Enable with `lynxdb server --auth`.

  parameters:
    XSource:
      name: X-Source
      in: header
      schema:
        type: string
      description: Tag events with a source label (e.g., `nginx`, `api-gateway`)
      example: nginx
    XFormat:
      name: X-Format
      in: header
      schema:
        type: string
        enum: [json, syslog, clf, raw, auto]
        default: auto
      description: Force log format parser. Default `auto` detects format.

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: AUTH_REQUIRED
              message: "Authentication is enabled. Provide a Bearer token."
              docs_url: "https://lynxdb.io/docs/auth"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: "Resource not found."
    InvalidQuery:
      description: Invalid SPL2 query
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_QUERY
              message: "Unknown field 'stauts'."
              suggestion: "status"
    QueryTimeout:
      description: Query exceeded time limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: QUERY_TIMEOUT
              message: "Query exceeded 30s timeout. Try narrowing the time range or adding filters."
    PayloadTooLarge:
      description: Event or batch exceeds size limit
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: PAYLOAD_TOO_LARGE
              message: "Event exceeds 1 MB limit."
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMITED
              message: "Ingest rate limit exceeded. Retry after 1s."

  schemas:

    # ── Generic ──

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable SCREAMING_SNAKE code
              example: INVALID_QUERY
            message:
              type: string
              example: "Unknown field 'stauts'"
            suggestion:
              type: string
              example: status
            docs_url:
              type: string
              format: uri

    Meta:
      type: object
      properties:
        took_ms:
          type: number
        scanned:
          type: integer
        query_id:
          type: string

    # ── Ingest ──

    LogEvent:
      type: object
      additionalProperties: true
      description: Any JSON object. No required schema.
      example:
        message: "GET /api/users 200 12ms"
        level: info
        source: nginx
        status: 200

    StructuredIngestEvent:
      type: object
      required: [event]
      properties:
        event:
          type: string
          description: Raw event text stored in `_raw`
        time:
          type: number
          description: Unix timestamp in seconds
        source:
          type: string
        sourcetype:
          type: string
        host:
          type: string
        index:
          type: string
        fields:
          type: object
          additionalProperties: true
          description: Additional scalar fields copied onto the event
      example:
        event: "request completed"
        source: "api"
        host: "web-01"
        fields:
          level: "info"
          duration_ms: 45

    IngestResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [accepted, failed]
          properties:
            accepted:
              type: integer
            failed:
              type: integer

    IngestPartialResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [accepted, failed, errors]
          properties:
            accepted:
              type: integer
            failed:
              type: integer
            errors:
              type: array
              items:
                type: object
                properties:
                  index:
                    type: integer
                  code:
                    type: string
                  message:
                    type: string

    ESBulkResponse:
      type: object
      properties:
        took:
          type: integer
        errors:
          type: boolean
        items:
          type: array
          items:
            type: object
            properties:
              index:
                type: object
                properties:
                  _id:
                    type: string
                  status:
                    type: integer

    # ── Query ──

    QueryRequest:
      type: object
      properties:
        q:
          type: string
          description: SPL2 query string
          example: "source=nginx status>=500 | stats count by uri"
        query:
          type: string
          description: Alias for `q`
        earliest:
          type: string
          description: Legacy alias for `from`
        latest:
          type: string
          description: Legacy alias for `to`
        from:
          type: string
          description: "Start time: relative (`-1h`, `-7d`) or ISO 8601. Default: `-15m`"
          default: "-15m"
          example: "-1h"
        to:
          type: string
          description: "End time: relative (`now`, `-5m`) or ISO 8601. Default: `now`"
          default: "now"
        limit:
          type: integer
          default: 1000
          maximum: 50000
          description: Max events to return
        offset:
          type: integer
          default: 0
          description: Offset for pagination (tabular results only)
        format:
          type: string
          enum: [json]
          default: json
          description: Optional response format selector. Only `json` is accepted on `/query`.
        wait:
          type: number
          nullable: true
          default: null
          description: |
            Controls sync/async behavior:
            - `null` (default) — **Sync.** Block until query completes. Returns `200` with results.
            - `0` — **Async.** Return `202` immediately with a job handle. Client polls or subscribes to SSE for progress.
            - `N` (seconds) — **Hybrid.** Wait up to N seconds. If query completes in time → `200` with results. If not → `202` with job handle and current progress. Best for UI: short queries feel instant, long queries degrade gracefully.
          example: 5
        profile:
          type: string
          enum: [basic, full, trace]
          description: Include richer execution statistics in the response `meta.stats`.
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables substituted into the query before planning.

    QueryStreamRequest:
      type: object
      properties:
        q:
          type: string
          description: SPL2 query string
        query:
          type: string
          description: Alias for `q`
        earliest:
          type: string
          description: Legacy alias for `from`
        latest:
          type: string
          description: Legacy alias for `to`
        from:
          type: string
          description: "Start time: relative (`-1h`, `-7d`) or ISO 8601."
        to:
          type: string
          description: "End time: relative (`now`, `-5m`) or ISO 8601."
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables substituted into the query before planning.

    AcceleratedBy:
      type: object
      properties:
        view:
          type: string
          description: Name of the MV used
        original_scan:
          type: integer
          description: Events that would have been scanned without MV
        speedup:
          type: string
          example: "~400x"
        status:
          type: string
          enum: [active, backfilling]
        coverage_percent:
          type: number
          description: Only present when MV is backfilling

    QueryEventsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, events, total]
          properties:
            type:
              type: string
              enum: [events]
            events:
              type: array
              items:
                $ref: '#/components/schemas/LogEvent'
            total:
              type: integer
            has_more:
              type: boolean
            partial:
              type: boolean
              description: Present and `true` when served from a backfilling MV
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                accelerated_by:
                  $ref: '#/components/schemas/AcceleratedBy'

    QueryAggregateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, columns, rows]
          properties:
            type:
              type: string
              enum: [aggregate]
            columns:
              type: array
              items:
                type: string
            rows:
              type: array
              items:
                type: array
            total_rows:
              type: integer
            partial:
              type: boolean
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                accelerated_by:
                  $ref: '#/components/schemas/AcceleratedBy'

    QueryTimechartResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, interval, columns, rows]
          properties:
            type:
              type: string
              enum: [timechart]
            interval:
              type: string
              example: "5m"
            columns:
              type: array
              items:
                type: string
            rows:
              type: array
              items:
                type: array
        meta:
          $ref: '#/components/schemas/Meta'

    QueryViewCreatedResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, view]
          properties:
            type:
              type: string
              enum: [view_created]
            view:
              $ref: '#/components/schemas/ViewSummary'
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Query Jobs (async) ──

    JobProgress:
      type: object
      required: [phase]
      properties:
        phase:
          type: string
          enum: [parsing, scanning_buffer, filtering_segments, scanning_segments, executing_pipeline]
          description: Current execution phase
        segments_total:
          type: integer
          description: Total segments considered for the query
        segments_scanned:
          type: integer
          description: Segments scanned so far
        segments_dispatched:
          type: integer
          description: Segments dispatched to workers
        segments_skipped_index:
          type: integer
        segments_skipped_time:
          type: integer
        segments_skipped_stats:
          type: integer
        segments_skipped_bloom:
          type: integer
        segments_skipped_range:
          type: integer
        buffered_events:
          type: integer
        rows_read_so_far:
          type: integer
          format: int64
          description: Rows read so far
        elapsed_ms:
          type: number
          description: Wall-clock time since job started

    QueryJobResponse:
      type: object
      required: [data]
      description: |
        Returned as `202` from `POST /query` when the query continues asynchronously,
        and as `200` from `GET /query/jobs/{id}`.
      properties:
        data:
          type: object
          required: [type, job_id, status]
          properties:
            type:
              type: string
              enum: [job]
            job_id:
              type: string
              example: "qry_9c1d4e"
            status:
              type: string
              enum: [running, done, error, canceled]
            query:
              type: string
              description: The original SPL2 query
            created_at:
              type: string
              format: date-time
            completed_at:
              type: string
              format: date-time
              description: Present when `status` is `done`
            progress:
              $ref: '#/components/schemas/JobProgress'
            results:
              description: Final query results. Present only when `status` is `done`. Same shape as sync `200` response `data`.
              oneOf:
                - type: object
                  properties:
                    type:
                      type: string
                      enum: [events]
                    events:
                      type: array
                      items:
                        $ref: '#/components/schemas/LogEvent'
                    total:
                      type: integer
                    has_more:
                      type: boolean
                - type: object
                  properties:
                    type:
                      type: string
                      enum: [aggregate]
                    columns:
                      type: array
                      items:
                        type: string
                    rows:
                      type: array
                      items:
                        type: array
                    total_rows:
                      type: integer
                - type: object
                  properties:
                    type:
                      type: string
                      enum: [timechart]
                    interval:
                      type: string
                    columns:
                      type: array
                      items:
                        type: string
                    rows:
                      type: array
                      items:
                        type: array
            error:
              description: Present when `status` is `error` or `canceled`
              type: object
              properties:
                code:
                  type: string
                  example: QUERY_MEMORY_EXCEEDED
                message:
                  type: string
                suggestion:
                  type: string
        meta:
          $ref: '#/components/schemas/Meta'

    JobListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [jobs]
          properties:
            jobs:
              type: array
              items:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [running, done, error, canceled]
                  query:
                    type: string
                  created_at:
                    type: string
                    format: date-time

    QueryExplainResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            parsed:
              type: object
              properties:
                pipeline:
                  type: array
                  items:
                    type: object
                result_type:
                  type: string
                  enum: [events, aggregate, timechart]
                estimated_cost:
                  type: string
                  enum: [low, medium, high]
                uses_full_scan:
                  type: boolean
                fields_read:
                  type: array
                  items:
                    type: string
                fields_produced:
                  type: array
                  items:
                    type: string
            acceleration:
              type: object
              properties:
                available:
                  type: boolean
                view:
                  type: string
                reason:
                  type: string
                estimated_speedup:
                  type: string
            is_valid:
              type: boolean
            errors:
              type: array
              items:
                type: object
                properties:
                  position:
                    type: integer
                  length:
                    type: integer
                  message:
                    type: string
                  suggestion:
                    type: string

    # ── Schema ──

    FieldsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [fields]
          properties:
            fields:
              type: array
              items:
                type: object
                required: [name, type, count, coverage]
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum: [string, integer, float, boolean, datetime]
                  count:
                    type: integer
                  coverage:
                    type: number
                    description: Fraction of events containing this field (0.0–1.0)
                  min:
                    type: number
                  max:
                    type: number
                  avg:
                    type: number
                  p50:
                    type: number
                  p99:
                    type: number
                  top_values:
                    type: array
                    items:
                      type: object
                      properties:
                        value: {}
                        count:
                          type: integer

    FieldValuesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [field, type, values]
          properties:
            field:
              type: string
            type:
              type: string
            values:
              type: array
              items:
                type: object
                properties:
                  value: {}
                  count:
                    type: integer
                  percent:
                    type: number
            unique_count:
              type: integer
            total_count:
              type: integer
        meta:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time

    SourcesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sources]
          properties:
            sources:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  event_count:
                    type: integer
                  last_event:
                    type: string
                    format: date-time
                  first_event:
                    type: string
                    format: date-time
                  rate:
                    type: number
                    description: Events per second (current)
                  storage_bytes:
                    type: integer

    # ── Histogram ──

    HistogramResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [interval, buckets, total]
          properties:
            interval:
              type: string
              example: "1m"
            buckets:
              type: array
              items:
                type: object
                required: [time, count]
                properties:
                  time:
                    type: string
                    format: date-time
                  count:
                    type: integer
            total:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'

    # ── Status ──

    StatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            version:
              type: string
            uptime_seconds:
              type: integer
            storage:
              type: object
              properties:
                used_bytes:
                  type: integer
                total_bytes:
                  type: integer
                usage_percent:
                  type: number
            events:
              type: object
              properties:
                total:
                  type: integer
                today:
                  type: integer
                ingest_rate:
                  type: number
            queries:
              type: object
              properties:
                active:
                  type: integer
                avg_duration_ms:
                  type: number
            views:
              type: object
              properties:
                total:
                  type: integer
                active:
                  type: integer
                backfilling:
                  type: integer
                storage_bytes:
                  type: integer
            retention:
              type: object
              properties:
                policy:
                  type: string
                oldest_event:
                  type: string
                  format: date-time
            health:
              type: string
              enum: [healthy, degraded, unhealthy]

    # ── Saved Queries ──

    SavedQuery:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        q:
          type: string
        from:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SavedQueryInput:
      type: object
      required: [name, q]
      properties:
        name:
          type: string
          example: "High 5xx rate"
        q:
          type: string
          example: "source=nginx status>=500 | stats count by uri | sort -count"
        from:
          type: string
          example: "-1h"

    SavedQueriesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [queries]
          properties:
            queries:
              type: array
              items:
                $ref: '#/components/schemas/SavedQuery'

    SavedQueryResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SavedQuery'

    # ── Materialized Views ──

    ViewSummary:
      type: object
      required: [name, kind, query, status]
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [projection, aggregation]
        query:
          type: string
        retention:
          type: string
        status:
          type: string
          enum: [active, backfilling, rebuilding, paused, error]
        version:
          type: integer
        rows:
          type: integer
        segments:
          type: integer
        storage_bytes:
          type: integer
        lag_ms:
          type: integer
          nullable: true
        backfill:
          $ref: '#/components/schemas/BackfillProgress'
        previous_version:
          type: object
          properties:
            version:
              type: integer
            status:
              type: string
        created_at:
          type: string
          format: date-time
        last_event:
          type: string
          format: date-time
          nullable: true

    BackfillProgress:
      type: object
      properties:
        total:
          type: integer
        processed:
          type: integer
        percent:
          type: number
        eta_seconds:
          type: integer

    ViewColumn:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, int64, float64, timestamp, boolean]
        encoding:
          type: string
          enum: [dictionary, delta-of-delta, delta-varint, gorilla, bitpacked]
        derived_from:
          type: array
          items:
            type: string
          description: Internal state columns for computed aggregates (e.g., avg = sum/count)

    ViewInput:
      type: object
      required: [name, q]
      properties:
        name:
          type: string
          pattern: '^mv_[a-z0-9_]+$'
          description: "Must start with `mv_`. Lowercase, underscores, alphanumeric."
          example: mv_errors_5m
        q:
          type: string
          description: SPL2 pipeline (without `| materialize`)
          example: "level=error | stats count, avg(duration) by source, time_bucket(timestamp, '5m') AS bucket"
        retention:
          type: string
          description: "Duration string. Default: same as index retention."
          example: "90d"
        partition_by:
          type: string
          description: Partition strategy expression
          example: "date(timestamp)"

    ViewPatchInput:
      type: object
      properties:
        retention:
          type: string
          example: "30d"
        paused:
          type: boolean

    ViewResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ViewSummary'

    ViewDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/ViewSummary'
            - type: object
              properties:
                columns:
                  type: array
                  items:
                    $ref: '#/components/schemas/ViewColumn'
                group_by:
                  type: array
                  items:
                    type: string
                aggregations:
                  type: array
                  items:
                    type: string
                stats:
                  type: object
                  properties:
                    rows:
                      type: integer
                    segments:
                      type: integer
                    segments_pending_merge:
                      type: integer
                    storage_bytes:
                      type: integer
                    compression_ratio:
                      type: number
                    lag_ms:
                      type: integer
                    ingest_rate:
                      type: number
                    oldest_event:
                      type: string
                      format: date-time
                    newest_event:
                      type: string
                      format: date-time
                source_view:
                  type: string
                  nullable: true
                  description: Parent MV name for cascading views

    ViewsListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [views]
          properties:
            views:
              type: array
              items:
                $ref: '#/components/schemas/ViewSummary'

    # ── Config ──

    ConfigPatch:
      type: object
      properties:
        retention:
          type: string
          example: "30d"
        max_query_memory_mb:
          type: integer
          example: 1024
        listen:
          type: string
          description: Requires restart
        auth_enabled:
          type: boolean
        otlp_enabled:
          type: boolean
        syslog_enabled:
          type: boolean
