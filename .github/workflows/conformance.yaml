name: Shipper Conformance

on:
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.4"

jobs:
  conformance:
    name: e2e matrix
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Run conformance matrix
        run: make test-conformance
