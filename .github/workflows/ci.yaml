# .github/workflows/ci.yaml
#
# CI pipeline for LynxDB
#
# Runs on every push to main and every pull request targeting main.
# Jobs:
#   1. build      — compile + vet (fast gate)
#   2. test-unit  — unit tests with race detector
#   3. test-e2e   — end-to-end tests (full server harness)
#   4. test-cli   — CLI integration tests against compiled binary
#   5. test-golden — golden tests (query output regression via .test/.expected files)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

env:
  GO_VERSION: "1.25.4"

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build docs
        working-directory: docs/site
        run: npm run build

      - name: Build Web UI
        run: make webui

      - name: Check shipper docs
        run: make docs-check-shippers

  web:
    name: Web UI Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: web
        run: bun run typecheck

      - name: Lint
        working-directory: web
        run: bun run lint

      - name: Unit tests
        working-directory: web
        run: bun run test

      - name: Build
        working-directory: web
        run: bun run build

      - name: Bundle budget
        working-directory: web
        run: bun run bundle:check

  web-smoke:
    name: Web UI Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: web
        run: bun run e2e
        env:
          CI: "true"

  test-unit:
    name: Unit Tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Run unit tests
        run: go test ./... -count=1 -timeout 300s -race

  test-e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Run E2E tests
        run: go test -tags e2e -count=1 -timeout 180s ./test/e2e/

  test-compat:
    name: Shipper Compatibility
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Run shipper compatibility tests
        run: make test-compat

  test-cli:
    name: CLI Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Build binary
        run: go build -o lynxdb ./cmd/lynxdb/

      - name: Run CLI tests
        run: go test -tags clitest -count=1 -timeout 600s -skip '^TestGolden' ./test/cli/

  test-golden:
    name: Golden Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Web UI
        run: make webui

      - name: Run golden tests
        run: go test -tags clitest -count=1 -timeout 300s -run '^TestGolden' -v ./test/cli/

  test-sigmaqueries:
    name: Sigma Query Contracts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run sigma query contracts
        run: go test -run . -count=1 -race ./pkg/sigmaqueries/...

      - name: Fuzz emitted SPL2 parser
        run: go test -run Fuzz -fuzz=FuzzParseEmittedSPL2 -fuzztime=30s ./pkg/sigmaqueries/...

      - name: Fuzz emitted SPL2 planner
        run: go test -run Fuzz -fuzz=FuzzPlanEmittedSPL2 -fuzztime=30s ./pkg/sigmaqueries/...

  test-sigma-compat:
    name: Sigma Compatibility
    needs: build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run sigma compatibility tests
        run: go test -tags integration -race ./test/integration/... -run TestSigmaCompat

  test-sigma-compat-nightly:
    name: Sigma Compatibility Nightly (${{ matrix.os }})
    needs: build
    if: github.event_name == 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run sigma compatibility tests
        run: go test -tags integration -race ./test/integration/... -run TestSigmaCompat
